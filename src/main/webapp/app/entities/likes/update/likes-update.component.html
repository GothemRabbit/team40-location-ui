<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-likes-heading" data-cy="LikesCreateUpdateHeading">Create or edit a Likes</h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_liked">Liked</label>
          <input type="checkbox" class="form-check" name="liked" id="field_liked" data-cy="liked" formControlName="liked" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_item">Item</label>
          <select class="form-control" id="field_item" data-cy="item" name="item" formControlName="item" [compareWith]="compareItem">
            <option [ngValue]="null"></option>
            @for (itemOption of itemsSharedCollection; track $index) {
              <option [ngValue]="itemOption">{{ itemOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_profileDetails">Profile Details</label>
          <select
            class="form-control"
            id="field_profileDetails"
            data-cy="profileDetails"
            name="profileDetails"
            formControlName="profileDetails"
            [compareWith]="compareProfileDetails"
          >
            <option [ngValue]="null"></option>
            @for (profileDetailsOption of profileDetailsSharedCollection; track $index) {
              <option [ngValue]="profileDetailsOption">{{ profileDetailsOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span>Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span>Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
