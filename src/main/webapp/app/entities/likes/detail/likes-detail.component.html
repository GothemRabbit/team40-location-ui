<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (likes(); as likesRef) {
      <div>
        <h2 data-cy="likesDetailsHeading"><span>Likes</span></h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ likesRef.id }}</span>
          </dd>
          <dt><span>Liked</span></dt>
          <dd>
            <span>{{ likesRef.liked }}</span>
          </dd>
          <dt><span>Item</span></dt>
          <dd>
            @if (likes()!.item) {
              <div>
                <a [routerLink]="['/item', likes()!.item?.id, 'view']">{{ likesRef.item?.id }}</a>
              </div>
            }
          </dd>
          <dt><span>Profile Details</span></dt>
          <dd>
            @if (likes()!.profileDetails) {
              <div>
                <a [routerLink]="['/profile-details', likes()!.profileDetails?.id, 'view']">{{ likesRef.profileDetails?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
        </button>

        <button type="button" [routerLink]="['/likes', likesRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
        </button>
      </div>
    }
  </div>
</div>
