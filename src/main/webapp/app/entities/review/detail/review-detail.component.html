<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (review(); as reviewRef) {
      <div>
        <h2 data-cy="reviewDetailsHeading">
          <span>{{ reviewRef.consumer?.userName }} review about {{ reviewRef.retailer?.userName }}</span>
        </h2>
        <div class="commentBoxRight">
          <div style="display: flex; justify-content: space-between">
            <p id="userName">
              <fa-icon icon="user" class="avatar"></fa-icon>
              <a [routerLink]="['/profile-details', review()!.consumer?.id, 'view']"> {{ reviewRef.consumer?.userName }}></a>
            </p>
            <p id="rates">
              <span id="stars" *ngFor="let index of [1, 2, 3, 4, 5]">
                {{ index >= (reviewRef.rating || 0) ? '&#9734;' : '&#9733;' }}
              </span>
            </p>
          </div>
          <p id="dialogue">
            {{ reviewRef.comments }}
          </p>
          <p id="date">
            {{ reviewRef.date | formatMediumDate }}
          </p>
          <fa-icon (click)="playSpeech()" [icon]="faPlay"> </fa-icon>
          <fa-icon (click)="stopSpeech()" [icon]="faPause"> </fa-icon>
        </div>

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>
        <div style="display: flex; justify-content: space-between">
          <button type="submit" (click)="previousState()" data-cy="entityDetailsBackButton">
            <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
          </button>
          <span>
            <button *ngIf="isOwner" type="button" [routerLink]="['/review', reviewRef.id, 'edit']">
              <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
            </button>

            <button *ngIf="isOwner" type="submit" (click)="delete(reviewRef)" data-cy="entityDeleteButton">
              <fa-icon icon="times"></fa-icon>
              <span class="d-none d-md-inline">Delete</span>
            </button>
          </span>
        </div>
      </div>
    }
  </div>
</div>
