<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (review(); as reviewRef) {
      <div>
        <h2 data-cy="reviewDetailsHeading">
          <span>
            <a [routerLink]="['/profile-details', review()!.consumer?.id, 'view']">{{ reviewRef.consumer?.userName }}</a> review about
            <a [routerLink]="['/profile-details', review()!.retailer?.id, 'view']">{{ reviewRef.retailer?.userName }}</a></span
          >
        </h2>
        <div class="commentBoxRight">
          <div style="display: flex; justify-content: space-between">
            <p id="userName">
              @if (review()?.consumer?.bioImage) {
                <img
                  [src]="'data:' + review()?.consumer?.bioImageContentType + ';base64,' + review()?.consumer?.bioImage"
                  alt="profileDetails"
                  class="avatar"
                />
              }
              <a [routerLink]="['/profile-details', review()!.consumer?.id, 'view']"> {{ reviewRef.consumer?.userName }}</a>
            </p>
            <p id="rates">
              <ngb-rating [rate]="review()?.rating ?? 0" [readonly]="true" [max]="5"></ngb-rating>
            </p>
          </div>
          <p id="dialogue">
            {{ reviewRef.comments }}
          </p>
          <div style="display: flex; justify-content: space-between">
            <button class="soundButton" (click)="soundButton()">
              <fa-icon [icon]="soundBool ? faPause : faPlay"></fa-icon>
            </button>
            <p id="date">
              {{ reviewRef.date | formatMediumDate }}
            </p>
          </div>
        </div>

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>
        <div style="display: flex; justify-content: space-between; flex-wrap: nowrap">
          <button type="submit" (click)="previousState()" data-cy="entityDetailsBackButton">
            <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
          </button>
          <span>
            <button *ngIf="isOwner" type="button" [routerLink]="['/review', reviewRef.id, 'edit']">
              <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
            </button>

            <button *ngIf="isOwner" type="submit" (click)="delete(reviewRef)" data-cy="entityDeleteButton">
              <fa-icon icon="times"></fa-icon>&nbsp;<span>Delete</span>
            </button>
          </span>
        </div>
      </div>
    }
  </div>
</div>
