<div class="formPage">
  <div class="d-flex justify-content-center">
    <div class="col-8">
      @if (review(); as reviewRef) {
        <div>
          <h2 data-cy="reviewDetailsHeading">
            <span id="heading">Review of user {{ reviewRef.id }}</span>
          </h2>

          <hr />

          <jhi-alert-error></jhi-alert-error>

          <jhi-alert></jhi-alert>

          <dl class="row-md jh-entity-details">
            <dt><span>ID</span></dt>
            <dd>
              <span>{{ reviewRef.id }}</span>
            </dd>
            <dt><span>Rating</span></dt>
            <dd>
              <span>{{ reviewRef.rating }}</span>
            </dd>
            <dt><span>Review Text</span></dt>
            <dd>
              <span>{{ reviewRef.reviewText }}</span>
            </dd>
            <dt><span>Review Date</span></dt>
            <dd>
              <span>{{ reviewRef.reviewDate | formatMediumDate }}</span>
            </dd>
          </dl>

          <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
            <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
          </button>

          <button type="button" [routerLink]="['/review', reviewRef.id, 'edit']" class="btn btn-primary">
            <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
          </button>
        </div>
      }
    </div>
  </div>
</div>
