<style>
  * {
    box-sizing: border-box;
  }
  body {
    font-family: Verdana, sans-serif;
    margin: 0;
  }
  .mySlides {
    display: none;
  }
  img {
    vertical-align: middle;
  }

  /* Slideshow container */
  .slideshow-container {
    max-width: 100%;
    position: relative;
    margin: auto;
  }

  /* Next & previous buttons */
  .prev,
  .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    padding: 16px;
    margin-top: -22px;
    color: white;
    font-weight: bold;
    font-size: 18px;
    transition: 0.6s ease;
    user-select: none;
  }

  /* Position the "next button" to the right */
  .next {
    right: 0;
  }

  /* On hover, add a dark background color */
  .prev:hover,
  .next:hover {
    background-color: rgba(0, 0, 0, 0.8);
  }

  /* Number text (e.g., 1/3) */
  .numbertext {
    color: #f2f2f2;
    font-size: 15px;
    padding: 8px 12px;
    position: absolute;
    top: 0;
    left: 0;
  }

  /* Thumbnail container (replacing dots) */
  .thumbnail-container {
    text-align: center;
    margin-top: 10px;
  }

  .thumbnail {
    cursor: pointer;
    height: 50px;
    margin: 0 2px;
    opacity: 0.6;
    transition: opacity 0.6s ease;
  }

  .thumbnail.active,
  .thumbnail:hover {
    opacity: 1;
  }

  /* Fading animation */
  .fade {
    animation-name: fade;
    animation-duration: 1.5s;
  }

  @keyframes fade {
    from {
      opacity: 0.4;
    }
    to {
      opacity: 1;
    }
  }
</style>

<div>
  <!-- JHipster Page Heading & Controls -->
  <h2 id="page-heading" data-cy="ImagesHeading">
    <span>Images</span>
    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [animation]="isLoading ? 'spin' : undefined"></fa-icon>
        <span>Refresh list</span>
      </button>
      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-images"
        [routerLink]="['/images/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span>Create a new Images</span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>
  <jhi-alert></jhi-alert>

  <!-- Alert if no images -->
  <div *ngIf="images?.length === 0" class="alert alert-warning" id="no-result">
    <span>No Images found</span>
  </div>

  <!-- Custom Slideshow View (if images exist) -->
  <div *ngIf="images && images.length > 0" class="slideshow-container">
    <div class="mySlides fade" *ngFor="let img of images; let i = index" [style.display]="currentSlideIndex === i ? 'block' : 'none'">
      <div class="numbertext">{{ i + 1 }} / {{ images.length }}</div>
      <img [src]="'data:' + (img.imagesContentType || 'image/png') + ';base64,' + (img.images || '')" style="width: 100%" />
      <!-- You can optionally add captions if available -->
      <div class="text">Caption {{ i + 1 }}</div>
    </div>

    <!-- Navigation Buttons -->
    <a class="prev" (click)="prevSlide()">❮</a>
    <a class="next" (click)="nextSlide()">❯</a>
  </div>

  <!-- Thumbnail Container Replacing Dots -->
  <div *ngIf="images && images.length > 0" class="thumbnail-container">
    <img
      *ngFor="let img of images; let i = index"
      class="thumbnail"
      [class.active]="currentSlideIndex === i"
      [src]="'data:' + (img.imagesContentType || 'image/png') + ';base64,' + (img.images || '')"
      (click)="goToSlide(i)"
      alt="Thumbnail {{ i + 1 }}"
    />
  </div>

  <!-- Optionally keep the JHipster Table View Below -->
  <div *ngIf="images && images.length > 0" class="table-responsive table-entities" id="entities">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [sortState]="sortState" (sortChange)="navigateToWithComponentValues($event)">
          <th scope="col" jhiSortBy="id">
            <div class="d-flex">
              <span>ID</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="images">
            <div class="d-flex">
              <span>Images</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="item.id">
            <div class="d-flex">
              <span>Item</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let img of images; trackBy: trackId">
          <td>
            <a [routerLink]="['/images', img.id, 'view']">{{ img.id }}</a>
          </td>
          <td>
            <a (click)="openFile(img.images, img.imagesContentType)">
              <img
                [src]="'data:' + (img.imagesContentType || 'image/png') + ';base64,' + (img.images || '')"
                style="max-height: 30px"
                alt="Image thumbnail"
              />
            </a>
            <span>{{ img.imagesContentType }}, {{ byteSize(img.images) }}</span>
          </td>
          <td>
            <div *ngIf="img.item">
              <a [routerLink]="['/item', img.item.id, 'view']">{{ img.item.id }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <a [routerLink]="['/images', img.id, 'view']" class="btn btn-info btn-sm" data-cy="entityDetailsButton">
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline">View</span>
              </a>
              <a [routerLink]="['/images', img.id, 'edit']" class="btn btn-primary btn-sm" data-cy="entityEditButton">
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline">Edit</span>
              </a>
              <button type="submit" (click)="delete(img)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
