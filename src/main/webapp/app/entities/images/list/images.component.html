<head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Verdana, sans-serif;
      margin: 0;
    }
    .mySlides {
      display: none;
    }
    img {
      vertical-align: middle;
    }
    .slideshow-container {
      max-width: 45%;
      position: relative;
      margin: auto;
    }
    .prev,
    .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      padding: 16px;
      margin-top: -22px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      transition: 0.6s ease;
      user-select: none;
    }
    .next {
      right: 0;
    }
    .prev:hover,
    .next:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }
    .numbertext {
      color: #f2f2f2;
      font-size: 15px;
      padding: 8px 12px;
      position: absolute;
      top: 0;
      left: 0;
    }
    .thumbnail-container {
      text-align: center;
      margin-top: 10px;
    }
    .thumbnail {
      cursor: pointer;
      height: 50px;
      margin: 0 2px;
      opacity: 0.6;
      transition: opacity 0.6s ease;
    }
    .thumbnail.active,
    .thumbnail:hover {
      opacity: 1;
    }
    .fade {
      animation-name: fade;
      animation-duration: 0.4s;
      animation-fill-mode: forwards;
    }
    @keyframes fade {
      from {
        opacity: 0.6;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div>
    <!-- JHipster Page Heading & Controls -->
    <h2 id="page-heading" data-cy="ImagesHeading">
      <span>Images</span>
      <div class="d-flex justify-content-end">
        <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
          <fa-icon icon="sync" [animation]="isLoading ? 'spin' : undefined"></fa-icon>
        </button>
        <button
          id="jh-create-entity"
          data-cy="entityCreateButton"
          class="btn btn-primary jh-create-entity create-images"
          [routerLink]="['/images/new']"
        >
          <fa-icon icon="plus"></fa-icon>
          <span>Create a new Images</span>
        </button>
      </div>
    </h2>

    <jhi-alert-error></jhi-alert-error>
    <jhi-alert></jhi-alert>

    <div *ngIf="images?.length === 0" class="alert alert-warning" id="no-result">
      <span>No Images found</span>
    </div>

    <!-- Custom Slideshow View (if images exist) -->
    <div *ngIf="images && images.length > 0" class="slideshow-container">
      <div class="mySlides fade" *ngFor="let img of images; let i = index" [style.display]="currentSlideIndex === i ? 'block' : 'none'">
        <div class="numbertext">{{ i + 1 }} / {{ images.length }}</div>
        <!-- Make only the main image clickable -->
        <a [routerLink]="['/images', img.id, 'view']">
          <img [src]="'data:' + (img.imagesContentType || 'image/png') + ';base64,' + (img.images || '')" style="width: 100%" />
        </a>
        <div class="text">Caption {{ i + 1 }}</div>
      </div>

      <!-- Navigation Buttons -->
      <a class="prev" (click)="prevSlide()">❮</a>
      <a class="next" (click)="nextSlide()">❯</a>
    </div>

    <!-- Thumbnail Container (for slideshow navigation) -->
    <div *ngIf="images && images.length > 0" class="thumbnail-container">
      <img
        *ngFor="let img of images; let i = index"
        class="thumbnail"
        [class.active]="currentSlideIndex === i"
        [src]="'data:' + (img.imagesContentType || 'image/png') + ';base64,' + (img.images || '')"
        (click)="goToSlide(i)"
        alt="Thumbnail {{ i + 1 }}"
      />
    </div>
  </div>
</body>
