<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (images(); as imagesRef) {
      <div>
        <h2 data-cy="imagesDetailsHeading"><span>Images</span></h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ imagesRef.id }}</span>
          </dd>
          <dt><span>Images</span></dt>
          <dd>
            @if (imagesRef.images) {
              <div>
                <a (click)="openFile(imagesRef.images ?? '', imagesRef.imagesContentType)">
                  <img [src]="'data:' + imagesRef.imagesContentType + ';base64,' + imagesRef.images" style="max-width: 100%" alt="images" />
                </a>
                {{ imagesRef.imagesContentType }}, {{ byteSize(imagesRef.images ?? '') }}
              </div>
            }
          </dd>
          <dt><span>Item</span></dt>
          <dd>
            @if (images()!.item) {
              <div>
                <a [routerLink]="['/item', images()!.item?.id, 'view']">{{ imagesRef.item?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
        </button>

        <button type="button" [routerLink]="['/images', imagesRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
        </button>
      </div>
    }
  </div>
</div>
