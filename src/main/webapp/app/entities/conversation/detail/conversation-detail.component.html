<div class="page-wrapper" *ngIf="conversation as conversationRef">
  <div class="container-fluid conversation-detail">
    <div class="w-100">
      <div class="chat-header d-flex justify-content-between align-items-center">
        <h2 data-cy="conversationDetailsHeading">{{ getChatTitle() }}</h2>
        <div>
          <button
            type="button"
            [routerLink]="['/conversation', conversationRef.id, 'edit']"
            class="btn btn-primary me-2"
            *jhiHasAnyAuthority="'ROLE_ADMIN'"
          >
            <fa-icon icon="pencil-alt"></fa-icon>
            <span>Edit</span>
          </button>

          <button type="button" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
            <fa-icon icon="arrow-left"></fa-icon>
            <span>Back</span>
          </button>
        </div>
      </div>

      <jhi-alert-error></jhi-alert-error>
      <jhi-alert></jhi-alert>

      <div class="chat-info mb-3">
        <p>
          <strong>Date Created:</strong>
          {{ conversationRef.dateCreated | formatMediumDatetime }}
        </p>
      </div>

      <div #messagesContainer class="chat-messages border rounded p-3 mb-3" style="height: 300px; overflow-y: auto">
        <div *ngFor="let msg of messages" class="chat-bubble" [ngClass]="{ user: isCurrentUser(msg) }">
          <strong class="chat-author">{{ msg.username }}</strong>
          <span class="chat-text">{{ msg.content }}</span>
          <br />
          <small class="chat-time">{{ msg.timestamp | date: 'short' }}</small>
        </div>
      </div>

      <!-- Message input area -->
      <div class="chat-input">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            placeholder="Type a message..."
            [(ngModel)]="newMessageContent"
            (keydown.enter)="sendMessage()"
          />
          <!-- Button to send the message -->
          <button class="btn btn-primary" type="button" (click)="sendMessage()">
            <fa-icon icon="paper-plane"></fa-icon>
            <span>Send Message</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
